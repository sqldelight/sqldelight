import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinCompilationTask

plugins {
  alias(libs.plugins.android.application)
  alias(libs.plugins.sqldelight)
}

sqldelight {
  databases {
    CommonDb {
      packageName = "com.sample.android"
      dependency project(":MultiplatformProject")
      dependency project(":AndroidLibraryA")
      dependency project(":AndroidLibraryB")
    }
  }
}

android {
  namespace = "com.example.sqldelight"

  compileSdk = libs.versions.compileSdk.get() as int

  compileOptions {
    sourceCompatibility = '1.8'
    targetCompatibility = '1.8'
  }

  buildTypes {
    release {}
    sqldelight {
      matchingFallbacks = ['staging']
    }
  }

  flavorDimensions "api"

  productFlavors {
    minApi21 {
      dimension "api"
      matchingFallbacks = ['minApi18']
    }
    minApi23 {
      dimension "api"
      matchingFallbacks = ['minApi18']
    }
  }
}

dependencies {
  implementation project(path: ':MultiplatformProject')
  implementation project(path: ':AndroidLibraryA')
  implementation project(path: ':AndroidLibraryB')
  implementation "app.cash.sqldelight:sqlite-driver:${app.cash.sqldelight.VersionKt.VERSION}"
  implementation libs.truth
}

tasks.withType(KotlinCompilationTask.class).configureEach {
  compilerOptions.jvmTarget = JvmTarget.JVM_1_8
}
